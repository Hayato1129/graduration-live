<!DOCTYPE html>
<html lang="ja" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026年 卒業ライブ🌟ゴーゴーレツゴーゴゴゴーゴゴーゴ</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Outfit:wght@700;900&display=swap"
        rel="stylesheet">
    <!-- Custom Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans JP"', 'sans-serif'],
                        display: ['"Outfit"', '"Noto Sans JP"', 'sans-serif'],
                    },
                    colors: {
                        space: {
                            900: '#0B0D17',
                            800: '#161A30',
                            700: '#222831',
                        },
                        star: {
                            glow: '#FFE382',
                            accent: '#FFB800'
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                        'fade-out': 'fadeOut 0.5s ease-out forwards',
                        // カード独自の浮遊アニメーション
                        'card-float': 'cardFloat 4s ease-in-out infinite',
                        // キラキラアニメーション
                        'shine': 'shine 3s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        fadeOut: {
                            '0%': { opacity: '1' },
                            '100%': { opacity: '0', pointerEvents: 'none' },
                        },
                        cardFloat: {
                            '0%, 100%': { transform: 'translateY(0) rotateX(5deg) rotateY(0deg)' },
                            '50%': { transform: 'translateY(-15px) rotateX(10deg) rotateY(5deg)' },
                        },
                        shine: {
                            '0%, 100%': { opacity: 0.3, transform: 'translateX(-100%) skew(-20deg)' },
                            '50%': { opacity: 0.8, transform: 'translateX(200%) skew(-20deg)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .text-glow {
            text-shadow: 0 0 15px rgba(255, 227, 130, 0.5);
        }

        .bg-stars {
            background-image:
                /* 近い星（大きくて明るい） */
                radial-gradient(3px 3px at 20px 30px, #fff, rgba(0, 0, 0, 0)),
                /* 中くらいの星 */
                radial-gradient(2px 2px at 130px 80px, #ddd, rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 70px 150px, #eee, rgba(0, 0, 0, 0)),
                /* 遠い星（小さくて暗い） */
                radial-gradient(1px 1px at 160px 120px, #bbb, rgba(0, 0, 0, 0)),
                radial-gradient(1px 1px at 50px 60px, #999, rgba(0, 0, 0, 0));
            background-repeat: repeat;
            background-size: 200px 200px;
        }

        /* 3D Flip Utilities */
        .perspective-1000 {
            perspective: 1000px;
        }

        .preserve-3d {
            transform-style: preserve-3d;
        }

        .backface-hidden {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .rotate-y-180 {
            transform: rotateY(180deg);
        }

        /* Hologram specific styles */
        .holo-overlay {
            background: linear-gradient(125deg,
                    rgba(255, 0, 0, 0.1) 0%,
                    rgba(255, 154, 0, 0.2) 10%,
                    rgba(208, 222, 33, 0.3) 20%,
                    rgba(79, 220, 74, 0.4) 30%,
                    rgba(63, 218, 216, 0.3) 40%,
                    rgba(47, 201, 226, 0.2) 50%,
                    rgba(28, 127, 238, 0.3) 60%,
                    rgba(95, 21, 242, 0.4) 70%,
                    rgba(186, 12, 248, 0.3) 80%,
                    rgba(251, 7, 217, 0.2) 90%,
                    rgba(255, 0, 0, 0.1) 100%);
            mix-blend-mode: color-dodge;
            opacity: 0.6;
        }

        /* Custom scrollbar for form */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 184, 0, 0.5);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 184, 0, 0.8);
        }

        /* ===== 流れ星キャラクターエフェクト ===== */
        .shooting-star-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            overflow: hidden;
        }

        .shooting-star {
            position: absolute;
            mix-blend-mode: screen;
            filter: drop-shadow(0 0 8px rgba(255, 230, 100, 0.8)) drop-shadow(0 0 20px rgba(255, 184, 0, 0.4));
            animation: shootingStar var(--duration, 3s) linear forwards;
        }

        /* 流れ星の尾（移動方向の後方＝右側に伸びる） */
        .shooting-star::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 100%;
            transform: translateY(-50%);
            width: 80px;
            height: 3px;
            background: linear-gradient(to right, rgba(255, 230, 100, 0.8), transparent);
            border-radius: 2px;
        }

        @keyframes shootingStar {
            0% {
                transform: translate(0, 0) rotate(15deg) scale(1);
                opacity: 0;
            }

            5% {
                opacity: 1;
            }

            85% {
                opacity: 1;
            }

            100% {
                transform: translate(calc(-100vw - 200px), calc(-60vh)) rotate(15deg) scale(1);
                opacity: 0;
            }
        }

        /* 53代君用: 左から右上へ飛ぶアニメーション */
        .shooting-star-right {
            position: absolute;
            mix-blend-mode: screen;
            filter: drop-shadow(0 0 8px rgba(255, 230, 100, 0.8)) drop-shadow(0 0 20px rgba(255, 184, 0, 0.4));
            animation: shootingStarRight var(--duration, 6s) linear forwards;
        }

        /* 53代君の光跡（移動方向の後方＝左側に伸びる） */
        .shooting-star-right::after {
            content: '';
            position: absolute;
            top: 50%;
            right: 100%;
            transform: translateY(-50%);
            width: 80px;
            height: 3px;
            background: linear-gradient(to left, rgba(255, 230, 100, 0.8), transparent);
            border-radius: 2px;
        }

        @keyframes shootingStarRight {
            0% {
                transform: translate(0, 0) rotate(-15deg) scale(1);
                opacity: 0;
            }

            5% {
                opacity: 1;
            }

            85% {
                opacity: 1;
            }

            100% {
                transform: translate(calc(100vw + 200px), calc(-60vh)) rotate(-15deg) scale(1);
                opacity: 0;
            }
        }

        /* ===== 小さな流れ星（光の粒） ===== */
        .meteor {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
        }

        .meteor-left {
            animation: meteorLeft var(--m-duration, 2.5s) linear forwards;
        }

        .meteor-right {
            animation: meteorRight var(--m-duration, 2.5s) linear forwards;
        }

        /* 光の尾（移動方向の後ろ＝右上側に伸びる） */
        .meteor-left::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 100%;
            transform: translateY(-50%);
            width: 50px;
            height: 1.5px;
            background: linear-gradient(to right, rgba(255, 255, 255, 0.7), transparent);
        }

        /* 光の尾（右下方向・未使用だが残す） */
        .meteor-right::after {
            content: '';
            position: absolute;
            top: 50%;
            right: 100%;
            transform: translateY(-50%);
            width: 50px;
            height: 1.5px;
            background: linear-gradient(to left, rgba(255, 255, 255, 0.7), transparent);
        }

        @keyframes meteorLeft {
            0% {
                transform: translate(0, 0) rotate(-25deg);
                opacity: 0;
            }

            8% {
                transform: translate(calc(-8vw), calc(4vh)) rotate(-25deg);
                opacity: 1;
            }

            60% {
                transform: translate(calc(-60vw), calc(30vh)) rotate(-25deg);
                opacity: 0.6;
            }

            70% {
                transform: translate(calc(-70vw), calc(35vh)) rotate(-25deg);
                opacity: 0;
            }

            100% {
                transform: translate(calc(-70vw), calc(35vh)) rotate(-25deg);
                opacity: 0;
            }
        }

        @keyframes meteorRight {
            0% {
                transform: translate(0, 0) rotate(25deg);
                opacity: 0;
            }

            8% {
                opacity: 1;
            }

            80% {
                opacity: 0.8;
            }

            100% {
                transform: translate(calc(100vw + 100px), calc(50vh)) rotate(25deg);
                opacity: 0;
            }
        }
    </style>
</head>

    <!-- UI制御用JavaScript -->
    <script>

            // ===== 流れ星キャラクターエフェクト（55代君 & 53代君） =====
            (function initShootingStars() {
                const container = document.getElementById('shooting-star-container');

                // キャラクター設定
                const CHARACTERS = [
                    { src: './55代君.png', className: 'shooting-star', startLeft: true },
                    { src: './53代君.png', className: 'shooting-star-right', startLeft: false }
                ];

                function createShootingStar() {
                    // ランダムにキャラクターを選択
                    const char = CHARACTERS[Math.floor(Math.random() * CHARACTERS.length)];

                    const star = document.createElement('img');
                    star.src = char.src;
                    star.className = char.className;

                    // 固定サイズ（100px）
                    star.style.width = '100px';
                    star.style.height = 'auto';

                    // トップビジュアル（header）の範囲内に出現を限定
                    const header = document.querySelector('#main-content header');
                    const headerTop = header ? header.offsetTop : 0;
                    const headerHeight = header ? header.offsetHeight : window.innerHeight;
                    star.style.top = (headerTop + headerHeight * (0.1 + Math.random() * 0.7)) + 'px';

                    // 55代君: 右から出現 / 53代君: 左から出現
                    if (char.startLeft) {
                        star.style.left = (100 + Math.random() * 10) + '%';
                    } else {
                        star.style.left = (-15 - Math.random() * 10) + '%';
                    }

                    // 固定のアニメーション時間（6秒）
                    star.style.setProperty('--duration', '6s');

                    container.appendChild(star);

                    // アニメーション終了後にDOMから削除
                    setTimeout(() => {
                        star.remove();
                    }, 6100);
                }

                // ランダムな間隔で流れ星を生成（12～20秒ごと）
                function scheduleNext() {
                    const delay = 12000 + Math.random() * 8000;
                    setTimeout(() => {
                        createShootingStar();
                        scheduleNext();
                    }, delay);
                }

                // 初回: 7秒後に最初の流れ星を表示
                setTimeout(() => {
                    createShootingStar();
                    scheduleNext();
                }, 7000);
            })();

        // ===== 小さな流れ星（光の粒）エフェクト =====
        (function initMeteors() {
            const container = document.getElementById('shooting-star-container');

            function createMeteor() {
                const dot = document.createElement('div');
                dot.className = 'meteor meteor-left';

                // サイズ: 2～4px
                const size = 2 + Math.random() * 2;
                dot.style.width = size + 'px';
                dot.style.height = size + 'px';

                // 色: 白～薄黄色
                const colors = ['#fff', '#fff', '#FFE382', '#fffbe6'];
                const color = colors[Math.floor(Math.random() * colors.length)];
                dot.style.background = color;
                dot.style.boxShadow = `0 0 ${size + 2}px ${color}`;

                // トップビジュアル範囲内に出現
                const header = document.querySelector('#main-content header');
                const headerTop = header ? header.offsetTop : 0;
                const headerHeight = header ? header.offsetHeight : window.innerHeight;
                dot.style.top = (headerTop + headerHeight * (0.05 + Math.random() * 0.5)) + 'px';

                // 右端から出現
                dot.style.left = (100 + Math.random() * 10) + '%';

                // 速度: 2～3.5秒
                const duration = 2 + Math.random() * 1.5;
                dot.style.setProperty('--m-duration', duration + 's');

                container.appendChild(dot);
                setTimeout(() => dot.remove(), duration * 1000 + 100);
            }

            function scheduleNext() {
                const delay = 8000 + Math.random() * 7000;
                setTimeout(() => {
                    createMeteor();
                    scheduleNext();
                }, delay);
            }

            // 初回: 5秒後
            setTimeout(() => {
                createMeteor();
                scheduleNext();
            }, 5000);
        })();
    </script>
